# Hostile
何事扰朕？ = What business disturbs Us?
速言，毋费朕之光阴！ = Speak quickly, do not waste Our time!
尔敢戏朕？！ = You dare mock Us?!
痴人说梦！ = A fool's daydream!
姑且如此 = So be it.
退下罢 = You are dismissed.

# Other
受命于天，既寿永昌！ = Having received the Mandate of Heaven, may it endure eternally!
杂碎！！！ = Wretched scum!!!
朕在，当守土开疆，扫平四夷，护我社稷 = While We live, We shall defend the land, expand the frontier, pacify the barbarians, and protect Our realm!
朕亡，亦将身化龙魂，佑我华夏永世不衰 = Even in death, We shall become a dragon spirit, guarding China for all eternity!
泰山不让土壤，故能成其大；河海不择细流，故能就其深 = Mount Tai does not reject any soil, thus it towers high; rivers and seas do not refuse any stream, thus they run deep.
战事已毕，或可共庆太平 = The war is over; perhaps we should celebrate peace together.
朕有一桩交易，且听 = We have a trade proposal — hear Us out.