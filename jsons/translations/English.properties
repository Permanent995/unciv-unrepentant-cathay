##### Mongolia Diplomacy #####
草原上的狼群，只有最强者才能统领！ = Only the strongest can lead the wolves of the steppe!
铁木真，草原上的雄主，统一蒙古各部，被尊为成吉思汗。您的铁蹄曾踏遍欧亚，建立了空前庞大的帝国。大汗，长生天庇佑着您，蒙古的铁骑将再次席卷天下！ = Temujin, master of the steppes, united the Mongol tribes and was honored as Genghis Khan. Your cavalry has swept across Eurasia, building an empire of unprecedented scale. Great Khan, blessed by the Eternal Blue Sky, the Mongol horde shall once again conquer the world!
我是成吉思汗，蒙古的大汗。草原的子民向你致意。 = I am Genghis Khan, Great Khan of the Mongols. The children of the steppe greet you.
长生天在上！蒙古的铁骑将踏平你们！ = By the Eternal Blue Sky! The Mongol horde shall trample you underhoof!
你们竟敢挑战大汗的权威？很好，那就让你们领教蒙古铁骑的厉害！ = You dare challenge the authority of the Great Khan? Very well, taste the might of the Mongol cavalry!
长生天……我的子孙将继承我的遗志…… = Eternal Blue Sky... my descendants shall carry on my legacy...
草原的子民欢迎你。 = The children of the steppe welcome you.
有事快说，大汗没有耐心。 = Speak quickly. The Great Khan has no patience.
草原上的商路永远畅通。你带什么来交换？ = The trade routes of the steppe are always open. What do you bring to trade?

